# set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g default-shell ${SHELL}
set -g mouse on

# Enable undercurl support (Smulx)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# Enable colored undercurl support (Setulc) - requires tmux 3.0+
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/{255}%&%d::%p1%{255}%&%d%;m'

# Remap prefix
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Re-source tmux cofiguration without exiting session
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Postition of the statusline 
set-option -g status-position top

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Set VI-mode
set-window-option -g mode-keys vi

# Keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind "k" display-popup -T "Tmux Sessions (worktree)" -E -w "90%" -h "90%" "sesh_load_worktree"
bind "j" display-popup -T "Tmux Sessions (sesh)" -E -w "90%" -h "90%" "sesh_load"
bind "l" display-popup -d "#{pane_current_path}" -T "lazygit" -E -w "95%" -h "90%" "lazygit -ucd ~/.config/lazygit"
bind "g" display-popup -d "#{pane_current_path}" -T "gitui" -E -w "95%" -h "90%" "gitui"
bind "t" display-popup -d "#{pane_current_path}" -T "terminal" -E -w "90%" -h "90%" "fish"
bind "n" display-popup -d "#{pane_current_path}" -T "nushell" -E -w "90%" -h "90%" "nu"
bind "b" display-popup -d "#{pane_current_path}" -T "but tui" -E -w "90%" -h "90%" "but tui"
bind "h" display-popup -d "#{pane_current_path}" -T "dash" -E -w "90%" -h "90%" "gh dash"

# TPM Plugins Setup
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Catppuccin theme configuration
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_status_background "default"
set -g @catppuccin_window_text_color "#{@thm_mantle}"

# Status line configuration
# set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#[fg=#{@thm_red} bold]P ,#{?#{==:#{pane_mode},copy-mode},#[fg=#{@thm_yellow} bold]Y ,#[fg=#{@thm_green} bold]N }}"
set -g status-right " #S "
# set -ag status-right "#{E:@catppuccin_status_application}"
# set -ag status-right "#{E:@catppuccin_status_directory}"

# Use bar separators for status modules
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_status_right_separator "█"

# Customize scroll speed
bind -Tcopy-mode WheelUpPane send -N1 -X scroll-up
bind -Tcopy-mode WheelDownPane send -N1 -X scroll-down

run '~/.tmux/plugins/tpm/tpm'

# Overides tmux plugin defaults
set -g message-style "fg=#94e2d5,bg=default,align=left,fill=#181815"
set -g message-command-style "fg=#94e2d5,bg=default,align=left,fill=#181815"
set -g message-line 0
